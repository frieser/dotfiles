# Generated by tinty-tmux-fix.sh from base16-gruvbox-dark-hard

# Status Bar Background
set -g status-style "bg=#1d2021,fg=#d5c4a1"

# Catppuccin v2 Dynamic Color Overrides
set -g @thm_bg "default"
set -g @thm_fg "#d5c4a1"

# Accent colors
set -g @thm_rosewater "#d65d0e"
set -g @thm_flamingo "#d65d0e"
set -g @thm_pink "#d3869b"
set -g @thm_mauve "#d3869b"
set -g @thm_red "#fb4934"
set -g @thm_maroon "#fb4934"
set -g @thm_peach "#fe8019"
set -g @thm_yellow "#fabd2f"
set -g @thm_green "#b8bb26"
set -g @thm_teal "#8ec07c"
set -g @thm_sky "#8ec07c"
set -g @thm_sapphire "#83a598"
set -g @thm_blue "#83a598"
set -g @thm_lavender "#d3869b"

# Force Module Colors to use Dynamic Accents
set -g @catppuccin_session_color "#{E:@thm_mauve}"
set -g @catppuccin_directory_color "#{E:@thm_blue}"
set -g @catppuccin_host_color "#{E:@thm_lavender}"
set -g @catppuccin_date_time_color "#{E:@thm_teal}"
set -g @catppuccin_battery_color "#{E:@thm_green}"
set -g @catppuccin_cpu_color "#{E:@thm_peach}"

# Text and UI elements
set -g @thm_subtext_1 "#bdae93"
set -g @thm_subtext_0 "#665c54"
set -g @thm_overlay_2 "#665c54"
set -g @thm_overlay_1 "#504945"
set -g @thm_overlay_0 "#504945"
set -g @thm_surface_2 "#3c3836"
set -g @thm_surface_1 "#3c3836"
set -g @thm_surface_0 "#1d2021"
set -g @thm_mantle "#1d2021"
set -g @thm_crust "#1d2021"

# Force reload of catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

